server:
  port: 8080

spring:
  application:
    name: agent-server

  # MySQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/agent_server?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Agent Configuration
agent:
  # Server node ID (auto-generated if not specified)
  node-id: ${AGENT_NODE_ID:}

  # Session auto-sleep timeout (minutes)
  session-sleep-timeout: 20

  # Agent checkpoint interval (seconds)
  checkpoint-interval: 30

  # LLM Configuration (placeholder - configure with your LLM provider)
  llm:
    endpoint: ${LLM_ENDPOINT:http://localhost:8081/v1/chat/completions}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:qwen-plus}
    max-tokens: 4096
    temperature: 0.7

  # MCP Servers (can also be registered via API at runtime)
  mcp:
    servers: []
    # Example:
    # servers:
    #   - server-id: aone-mcp
    #     name: Aone Platform MCP
    #     endpoint: http://aone-mcp-server:8090/mcp
    #     transport-type: streamable-http
    #     auth:
    #       type: bearer
    #       token: ${AONE_MCP_TOKEN:}

  # Sub-Agent Configuration (can also be registered via API at runtime)
  sub-agents: []
  # Example:
  # sub-agents:
  #   - agent-id: normandy-agent
  #     base-url: http://normandy-agent:8091

  # Spring AI - OpenAI Compatible (Chat + Embedding)
  ai:
    openai:
      api-key: ${LLM_API_KEY:sk-xxx}
      base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      chat:
        options:
          model: ${LLM_MODEL:qwen-plus}
          temperature: 0.3
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v3}
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: ${EMBEDDING_DIMENSIONS:1024}
        initialize-schema: true

  # PostgreSQL for PGVector
  pgvector-datasource:
    url: ${PG_URL:jdbc:postgresql://localhost:5432/agent_rag}
    username: ${PG_USERNAME:postgres}
    password: ${PG_PASSWORD:postgres}

# RAG Pipeline Configuration
rag:
  # Retrieval mode: "mcp" (L.O.C.A.L MCP, recommended) or "pgvector" (local PGVector)
  mode: ${RAG_MODE:mcp}

  # L.O.C.A.L MCP configuration (only used when mode=mcp)
  mcp:
    endpoint: ${MCP_ENDPOINT:https://local.io.alibaba-inc.com/api/mcp}
    token: ${MCP_TOKEN:}
    # Knowledge repo IDs from L.O.C.A.L platform (find in knowledge base settings)
    repo-ids: ${MCP_REPO_IDS:}
    # Knowledge group IDs (alternative to repo-ids)
    group-ids: ${MCP_GROUP_IDS:}
    # Search mode: preciseRetrieval (search specified repos) or retrievalUserKnowledge (search all accessible)
    search-mode: ${MCP_SEARCH_MODE:preciseRetrieval}
    top-k: 20
    score-threshold: 0.0
    summary: false
    connect-timeout-seconds: 30
    read-timeout-seconds: 60

  # Query rewrite: max sub-questions generated from original query
  query-rewrite:
    max-sub-questions: 5
    enabled: true
  # Retrieval settings
  retrieval:
    # Number of documents returned by hybrid search
    top-k: 10
    # Similarity threshold (0.0 ~ 1.0)
    similarity-threshold: 0.5
    # Keyword search weight in hybrid scoring (embedding weight = 1 - keyword-weight)
    keyword-weight: 0.3
  # Rerank settings
  rerank:
    enabled: true
    # Final number of documents after reranking
    top-n: 5
  # Document ingestion
  ingestion:
    # Chunk size in tokens
    chunk-size: 800
    # Overlap between chunks in tokens
    chunk-overlap: 200

# Logging Configuration
logging:
  level:
    com.agent: DEBUG
    org.springframework.web.socket: INFO
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
